<style>
@font-face {
    font-family: 'Tajawal';
    src: url('/font/Tajawal-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}

    font-family: 'Tajawal';
    src: url('/font/Tajawal-Medium.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Tajawal';
    src: url('/font/Tajawal-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;

    font-family: 'Zain';
    src: url('/font/Zain-Bold.woff2') format('woff2');

}
@font-face {
    font-family: 'Zain';
    src: url('/font/Zain-Black.woff2') format('woff2');
    font-weight: 900;
    font-style: normal;
    font-display: swap;
}

:root {
    --primary: #16a064;
    --primary-dark: #087046;
    --primary-soft: #e9fff4;
    --secondary: #2563eb;
    --secondary-soft: #eff6ff;
    --ink: #143047;
    --muted: #64748b;
    --line: rgba(22, 160, 100, 0.18);
    --card: rgba(255, 255, 255, 0.94);
    --shadow: 0 10px 24px rgba(20, 48, 71, 0.09);
    --radius: 24px;
    --font-body: 'Tajawal', Arial, sans-serif;
    --font-heading: 'Tajawal', Arial, sans-serif;
    --font-ui: 'Tajawal', Arial, sans-serif;
    --font-name: 'Zain', 'Tajawal', Arial, sans-serif;
}

* { box-sizing: border-box; }
body { margin: 0; padding: 0; font-family: var(--font-body); background: #f7fbf8; color: var(--ink); }

.home-wrapper {
    min-height: 100vh;
    direction: rtl;
    padding: 34px 18px 28px;
    background: radial-gradient(circle at top right, rgba(22, 160, 100, 0.12), transparent 30rem), linear-gradient(180deg, #f8fbff 0%, #eef7f1 100%);
}

.profile-section {
    position: relative; max-width: 1100px; margin: 0 auto 28px auto; text-align: center; padding: 34px 22px 30px; overflow: hidden; border: 1px solid var(--line); border-radius: 32px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(233, 255, 244, 0.88)); box-shadow: var(--shadow); transform: translateZ(0);
}
.profile-section::before { content: ""; position: absolute; left: -75px; bottom: -95px; width: 190px; height: 190px; border-radius: 50%; background: rgba(22, 160, 100, 0.12); }
.profile-section::after { content: ""; position: absolute; right: -80px; top: -95px; width: 205px; height: 205px; border-radius: 50%; background: rgba(37, 99, 235, 0.10); }
.profile-content { position: relative; z-index: 2; }

.profile-image {
    width: 148px; height: 148px; border-radius: 50%; object-fit: cover; object-position: center; background: #fff; padding: 7px; border: 1px solid rgba(22, 160, 100, 0.22);
    box-shadow: 0 10px 22px rgba(20, 48, 71, 0.13); margin-bottom: 20px; transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.profile-image:hover { transform: translateY(-5px) scale(1.025); box-shadow: 0 14px 28px rgba(20, 48, 71, 0.15); }

.main-title { margin: 0; color: var(--ink); line-height: 1.7; font-family: var(--font-heading); }
.main-title .welcome-line { display: block; font-size: clamp(21px, 4vw, 31px); font-weight: 500; letter-spacing: -0.03em; }
.main-title .name-line {
    display: block; margin-top: 4px; font-family: var(--font-name); font-size: clamp(38px, 6vw, 64px); font-weight: 900; color: var(--primary-dark);
    line-height: 1; white-space: nowrap; text-shadow: 0 5px 14px rgba(8, 112, 70, 0.18);
}

.subtitle {
    display: inline-flex; align-items: center; justify-content: center; margin: 16px auto 0 auto; padding: 9px 16px; max-width: 680px; color: var(--muted);
    background: rgba(255, 255, 255, 0.76); border: 1px solid rgba(22, 160, 100, 0.14); border-radius: 999px; font-size: 16px; font-weight: 500; line-height: 1.9;
}

.works-section { max-width: 1100px; margin: 0 auto; }
.section-header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; padding: 14px 16px; border: 1px solid rgba(22, 160, 100, 0.16);
    border-radius: 22px; background: rgba(255, 255, 255, 0.92); box-shadow: 0 6px 16px rgba(20, 48, 71, 0.06);
}
.section-title { margin: 0; font-family: var(--font-heading); font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -0.04em; }
.section-badge {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px; flex: 0 0 auto; min-height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; padding: 8px 16px; border-radius: 999px; font-size: 14px; font-weight: 800; box-shadow: 0 7px 14px rgba(8, 112, 70, 0.14);
}

.cards-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
.work-card {
    position: relative; display: block; min-height: 166px; padding: 22px 20px; background: var(--card); border: 1px solid rgba(22, 160, 100, 0.17);
    border-radius: var(--radius); text-decoration: none; color: inherit; overflow: hidden; box-shadow: 0 6px 16px rgba(20, 48, 71, 0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.work-card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 5px; background: linear-gradient(90deg, var(--primary), #71d89f, var(--secondary)); }
.work-card::after { content: ""; position: absolute; left: -55px; bottom: -65px; width: 150px; height: 150px; border-radius: 50%; background: rgba(22, 160, 100, 0.08); opacity: 0; transition: opacity 0.2s ease; }
.work-card:hover { transform: translateY(-4px); box-shadow: 0 10px 22px rgba(20, 48, 71, 0.10); border-color: rgba(22, 160, 100, 0.42); }
.work-card:hover::after { opacity: 1; }

.card-content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; }
.card-number {
    width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--secondary), #1d4ed8);
    color: #fff; border-radius: 15px; font-size: 15px; font-weight: 900; margin-bottom: 18px; box-shadow: 0 8px 18px rgba(37, 99, 235, 0.21);
}
.card-title { margin: 0 0 16px 0; font-family: var(--font-heading); font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.85; letter-spacing: -0.035em; }
.card-link {
    display: inline-flex; align-items: center; gap: 7px; width: fit-content; margin-top: auto; color: var(--primary-dark); background: var(--primary-soft);
    border: 1px solid rgba(22, 160, 100, 0.14); padding: 8px 12px; border-radius: 999px; font-size: 14px; font-weight: 800;
}
.card-link::before { content: "←"; font-size: 17px; transition: transform 0.2s ease; }
.work-card:hover .card-link::before { transform: translateX(-4px); }

.footer-note { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; text-align: center; margin-top: 26px; padding: 15px 18px; color: var(--muted); background: rgba(255, 255, 255, 0.82); border: 1px solid rgba(22, 160, 100, 0.15); border-radius: 20px; box-shadow: 0 6px 14px rgba(20, 48, 71, 0.05); font-size: 14px; font-weight: 700; }
.loading-msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--muted); font-size: 18px; }

@media (hover: none) { .profile-image:hover, .work-card:hover { transform: none; } .work-card:hover::after { opacity: 0; } }
@media (max-width: 992px) { .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 600px) {
    .home-wrapper { padding: 14px 10px 20px; }
    .profile-section { padding: 26px 14px 24px; border-radius: 24px; margin-bottom: 18px; }
    .profile-image { width: 122px; height: 122px; margin-bottom: 16px; }
    .main-title .welcome-line { font-size: 21px; }
    .main-title .name-line { font-size: clamp(34px, 9.5vw, 42px); }
    .subtitle { width: 100%; border-radius: 16px; font-size: 14.5px; padding: 9px 12px; }
    .section-header { padding: 12px; border-radius: 18px; }
    .section-title { font-size: 20px; }
    .section-badge { min-height: 36px; font-size: 12.5px; }
    .cards-grid { grid-template-columns: 1fr; gap: 12px; }
    .work-card { padding: 19px 16px; border-radius: 18px; }
    .card-link { width: 100%; justify-content: center; }
}
</style>
</head>
<body>
<main class="home-wrapper">

    <section class="profile-section">
        <div class="profile-content">
            <img 
                src="https://i.postimg.cc/Gmq96y4R/347590685-273239908641467-8867587916477147235-n.jpg" 
                alt="فراس محمد سحويل " 
                class="profile-image"
                loading="eager"
                decoding="async"
                fetchpriority="high"
            >

            <h1 class="main-title">
                <span class="welcome-line">مرحبًا بكم في موقع المهندس</span>
                <span class="name-line">فراس محمد سحويل</span>
            </h1>

            <p class="subtitle">
                معرض أعمالي ومشاريعي الرقمية - تحديث حي ومباشر.
            </p>
        </div>
    </section>

    <section class="works-section">
        <div class="section-header">
            <h2 class="section-title">قائمة الأعمال</h2>
            <div class="section-badge" id="project-count">جاري الاتصال...</div>
        </div>

        <div class="cards-grid" id="projects-container">
            <div class="loading-msg">جاري جلب المشاريع الحية...</div>
        </div>

        <div class="footer-note">
            <span class="copyright-line">جميع الحقوق محفوظة © 2026.</span>
        </div>
    </section>

</main>

<script>
// تم ربط الـ API الخاص بك بنجاح ومباشرة هنا
const googleWebAppUrl = 'https://script.google.com/macros/s/AKfycbzfFu27oYNlIWm1QB19DVR9pgGY1DdWUqCwdkPnZ1PLivUphTAX_OXmiofJx1wZbOQG/exec';

window.addEventListener('DOMContentLoaded', function () {
    const container = document.getElementById('projects-container');
    const badge = document.getElementById('project-count');

    if (!googleWebAppUrl || googleWebAppUrl.includes('ضع_رابط_تطبيق')) {
        container.innerHTML = '<div class="loading-msg" style="color: #ef4444;">يرجى وضع رابط تطبيق الويب المولد من Apps Script داخل الكود أولاً لربط المحرك!</div>';
        badge.textContent = '0 عمل متاح';
        return;
    }

    // جلب البيانات من محرك غوغل شيت مباشرة كـ JSON مخصص
    fetch(googleWebAppUrl)
        .then(response => {
            if (!response.ok) throw new Error('فشل جلب البيانات البرمجية');
            return response.json();
        })
        .then(projects => {
            if (!projects || projects.length === 0) {
                container.innerHTML = '<div class="loading-msg">لا توجد مشاريع مضافة حالياً في جدول البيانات البرمجي.</div>';
                badge.textContent = '0 عمل متاح';
                return;
            }

            // تحديث عداد المشاريع تلقائياً
            badge.textContent = `${projects.length} عملًا متاحًا`;
            
            // تصفير الحاوية وبناء العناصر بناء على بيانات المحرك
            container.innerHTML = '';
            projects.forEach((project, index) => {
                const card = document.createElement('a');
                card.href = project.link;
                card.className = 'work-card';
                card.target = '_blank';
                card.style.setProperty('--card-index', index + 1);
                
                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-number">${index + 1}</div>
                        <h3 class="card-title">${project.title}</h3>
                        <span class="card-link">الدخول إلى الرابط</span>
                    </div>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            console.error(error);
            container.innerHTML = '<div class="loading-msg" style="color: #ef4444;">حدث خطأ في الاتصال بمحرك البيانات قوقل شيت. تأكد من نشر السكريبت كـ Anyone.</div>';
            badge.textContent = 'خطأ بالمحرك';
        });
});
</script>
</body>
